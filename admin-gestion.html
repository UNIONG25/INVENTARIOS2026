<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Administrativa - Inventarios 2026</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
</head>
<body>

    <div class="contenedor-admin" style="max-width: 600px; margin: 40px auto; padding: 20px;">
        <h2>Registro de Nuevo Usuario</h2>
        
        <form id="form-registro">
            <div style="margin-bottom: 15px;">
                <label>Nombre Completo:</label>
                <input type="text" id="txt-nombre" required style="width: 100%; padding: 8px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Correo (Usuario):</label>
                <input type="email" id="txt-email" required style="width: 100%; padding: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Contraseña:</label>
                <input type="password" id="txt-password" required style="width: 100%; padding: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Rol:</label>
                <select id="select-rol" style="width: 100%; padding: 8px;">
                    <option value="admin">Administrador</option>
                    <option value="operador">Operador</option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label>ID Centro Asignado:</label>
                <input type="number" id="select-centro" required style="width: 100%; padding: 8px;">
            </div>

            <button type="submit" style="padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer;">
                Registrar Usuario
            </button>
        </form>
    </div>

    <script>
        const formLogin = document.getElementById('form-login');
        
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const email = document.getElementById('txt-email').value.trim();
            const pass = document.getElementById('txt-clave').value.trim();
            const btn = document.getElementById('btn-entrar');

            btn.disabled = true;
            btn.innerText = "Validando...";

            try {
                // 1. Autenticación con Supabase Auth
                const { data: authData, error: errorAuth } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: pass,
                });

                if (errorAuth) throw errorAuth;

                // 2. Obtener datos adicionales del perfil
                const { data: userData, error: errorProfile } = await supabaseClient
                    .from('usuarios_sistema')
                    .select('username, rol, centro_asignado_id, nombre_completo, user_id')
                    .eq('username', email)
                    .single();

                if (errorProfile) throw errorProfile;

                // 3. Éxito: Guardar sesión y redirigir
                alert("✓ Inicio de sesión exitoso.");
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error("Error de login:", err);
                alert("❌ Acceso denegado: " + err.message);
                btn.disabled = false;
                btn.innerText = "Entrar al Sistema";
            }
        });
    </script>
</body>
</html>
