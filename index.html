<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventario Solidario</title>
<!-- [Tu CSS original permanece igual para preservar el diseño] -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
h1{font-size:1.5rem;margin-bottom:16px;color:#38bdf8}
h2{font-size:1.1rem;margin-bottom:12px;color:#94a3b8}
label{display:block;font-size:.85rem;margin:8px 0 4px;color:#94a3b8}
input,select,textarea,button{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:.95rem;margin-bottom:8px}
button{background:#0ea5e9;color:white;font-weight:600;cursor:pointer;border:none;transition:.2s}
button:hover{background:#0284c7}
button.danger{background:#dc2626}
button.danger:hover{background:#b91c1c}
button.ghost{background:transparent;border:1px solid #334155}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse;font-size:.9rem}
th,td{padding:8px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.75rem;font-weight:600}
.b-in{background:#065f46;color:#6ee7b7}
.b-out{background:#7f1d1d;color:#fca5a5}
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 14px;border-radius:8px;background:#1e293b;cursor:pointer;white-space:nowrap;font-size:.9rem;border:1px solid #334155}
.tab.active{background:#0ea5e9;color:white;border-color:#0ea5e9}
.hidden{display:none!important}
.alert{padding:10px;border-radius:8px;margin-bottom:12px;font-size:.9rem}
.alert.err{background:#7f1d1d;color:#fecaca}
.alert.ok{background:#065f46;color:#a7f3d0}
.mono{font-family:ui-monospace,Menlo,monospace;font-size:.8rem}
</style>
</head>
<body>
<div class="container">
  <section id="view-login" class="card">
    <h1>📦 Inventario Solidario</h1>
    <label>Usuario</label> <input id="login-user">
    <label>Contraseña</label> <input id="login-pass" type="password">
    <button id="btn-login">Ingresar</button>
  </section>
  <section id="view-app" class="hidden">
    <h1>📦 Inventario</h1>
    <div class="tabs" id="tabs"></div>
    <div id="tab-content"></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// [Aquí va toda tu configuración original de SB, Crypto y Auth que ya tenías]
const sb = supabase.createClient('TU_URL', 'TU_ANON'); // AJUSTA ESTO

// ============================================
// MOVIMIENTOS - AJUSTADO A TABLAS MIGRADAS
// ============================================
async function renderStock(c) {
  // Obtenemos productos desde tabla 'items'
  const {data:items} = await sb.from('items').select('*');
  window._prodsCache = items;
  
  // Obtenemos movimientos desde tabla 'movements'
  const {data:movs} = await sb.from('movements')
    .select('*, items(name)')
    .eq('center_id', session.centerId)
    .order('movement_date', {ascending:false});
  
  let movsRows = '';
  (movs||[]).forEach(m => {
    const badgeClass = m.type === 'entrada' ? 'b-in' : 'b-out';
    movsRows += `
      <tr>
        <td>${new Date(m.movement_date).toLocaleString()}</td>
        <td>${m.items?.name || '---'}</td>
        <td><span class="badge ${badgeClass}">${m.type}</span></td>
        <td>${m.quantity}</td>
        <td>${m.entity_name||''}</td>
      </tr>
    `;
  });
  
  c.innerHTML = `
    <div class="card">
      <h2>Registrar movimiento</h2>
      <label>Producto</label>
      <select id="m-item-id">${items.map(i => `<option value="${i.id}">${i.name}</option>`).join('')}</select>
      <div class="row">
        <div><label>Tipo</label>
          <select id="m-type">
            <option value="entrada">⬇ Ingreso</option>
            <option value="salida">⬆ Despacho</option>
          </select>
        </div>
        <div><label>Cantidad</label><input id="m-qty" type="number"></div>
      </div>
      <label>Entidad / Refugio</label>
      <input id="m-entity" placeholder="Ej: Sudeban">
      <button id="btn-save-movement">Registrar</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cant.</th><th>Entidad</th></tr></thead>
        <tbody>${movsRows}</tbody>
      </table>
    </div>
  `;
  document.getElementById('btn-save-movement').onclick = saveMovement;
}

async function saveMovement() {
  const item_id = document.getElementById('m-item-id').value;
  const type = document.getElementById('m-type').value;
  const quantity = parseInt(document.getElementById('m-qty').value);
  const entity_name = document.getElementById('m-entity').value;
  
  const {error} = await sb.from('movements').insert({
    center_id: session.centerId,
    item_id, type, quantity, entity_name,
    movement_date: new Date().toISOString()
  });
  
  if (error) return alert(error.message);
  renderStock(document.getElementById('tab-content'));
}

// [Mantén el resto de tus funciones de auditoría y UI originales aquí debajo]
</script>
</body>
</html>
