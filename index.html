<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Solidario 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS Base (Mantén tu estilo original) */
        body { font-family: system-ui; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: #0ea5e9; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Formulario Inteligente -->
        <section class="card">
            <h1>📦 Registro de Movimiento</h1>
            <input id="in-name" placeholder="Nombre del producto">
            <input id="in-barcode" placeholder="Código de barras">
            <input id="in-entity" placeholder="Empresa/Ente donante o receptor">
            <select id="in-type">
                <option value="ingreso">Ingreso</option>
                <option value="despacho">Despacho</option>
            </select>
            <input id="in-qty" type="number" placeholder="Cantidad">
            <button id="btn-save">Registrar Movimiento</button>
        </section>
    </div>

    <script>
        const supabase = supabase.createClient('https://ajhubmxofzfdelxbgjjf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaHVibXhvZnpmZGVseGJnampmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzEwOTIsImV4cCI6MjA5OTAwNzA5Mn0.19vQ77T-kjNIu3-VZYrBT8hOnhiJvYtvwTfEiFK_8qU');

        document.getElementById('btn-save').onclick = async () => {
            const data = {
                p_item_name: document.getElementById('in-name').value,
                p_item_barcode: document.getElementById('in-barcode').value,
                p_entity_name: document.getElementById('in-entity').value,
                p_entity_type: document.getElementById('in-type').value === 'ingreso' ? 'donante' : 'receptor',
                p_quantity: parseInt(document.getElementById('in-qty').value),
                p_type: document.getElementById('in-type').value,
                p_center_id: 'TU_CENTER_ID', // Este ID vendrá de la sesión al loguearse
                p_user_id: 'TU_USER_ID'      // Este ID vendrá de la sesión al loguearse
            };

            const { error } = await supabase.rpc('register_movement', data);
            if (error) alert("Error: " + error.message);
            else alert("Registro exitoso");
        };
    </script>
</body>
</html>
