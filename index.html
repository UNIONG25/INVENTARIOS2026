<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #0ea5e9; color: #0ea5e9; }
    </style>
</head>
<body class="min-h-screen text-slate-200">

    <header class="bg-slate-900 border-b border-slate-800 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">Inventario <span class="text-sky-500">2026</span></h1>
            <div id="user-status" class="text-xs text-slate-400">Sesión iniciada: Administrador</div>
        </div>
    </header>

    <nav class="max-w-5xl mx-auto mt-6 px-4">
        <div class="flex space-x-6 border-b border-slate-700">
            <button onclick="switchTab('config')" class="tab-btn active pb-2 text-sm font-medium transition-all">Configuración</button>
            <button onclick="switchTab('ingreso')" class="tab-btn pb-2 text-sm font-medium transition-all">Entradas</button>
            <button onclick="switchTab('despacho')" class="tab-btn pb-2 text-sm font-medium transition-all">Despachos</button>
            <button onclick="switchTab('inventario')" class="tab-btn pb-2 text-sm font-medium transition-all">Inventario</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 mt-6">
        
        <!-- PESTAÑA: Configuración -->
        <section id="config" class="tab-content active space-y-6">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-lg font-semibold mb-4 text-white">Gestión de Usuarios</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="Nuevo Usuario" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full focus:ring-2 focus:ring-sky-500 outline-none">
                    <input type="password" placeholder="Clave" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <select class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                        <option>Nivel: Administrador</option>
                        <option>Nivel: Operador</option>
                    </select>
                </div>
                <button class="mt-4 bg-sky-600 hover:bg-sky-500 text-white px-6 py-2 rounded-lg font-medium">Crear Usuario</button>
            </div>
        </section>

        <!-- PESTAÑA: Entradas -->
        <section id="ingreso" class="tab-content space-y-6">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-lg font-semibold mb-4 text-white">Registrar Entrada al Almacén</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="Empresa o Ente que dona" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="date" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="text" placeholder="Código de barras / Manual" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="text" placeholder="Nombre del producto" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="number" placeholder="Cantidad" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full col-span-1 md:col-span-2">
                </div>
                <button class="mt-4 bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-medium w-full">Guardar Ingreso</button>
            </div>
        </section>

        <!-- PESTAÑA: Despacho -->
        <section id="despacho" class="tab-content space-y-6">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-lg font-semibold mb-4 text-white">Registrar Despacho</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="Destino / Receptor" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="text" placeholder="Contacto del receptor" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="text" placeholder="Código de producto" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="text" placeholder="Producto" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
                    <input type="number" placeholder="Cantidad" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full col-span-1 md:col-span-2">
                </div>
                <button class="mt-4 bg-amber-600 hover:bg-amber-500 text-white px-6 py-2 rounded-lg font-medium w-full">Guardar Despacho</button>
            </div>
        </section>

        <!-- PESTAÑA: Inventario -->
        <section id="inventario" class="tab-content">
            <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                <div class="p-6 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-white">Inventario Actual</h2>
                    <button class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-1 rounded-md">Exportar Excel</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-900 text-slate-400 uppercase">
                            <tr>
                                <th class="px-6 py-3">Producto</th>
                                <th class="px-6 py-3">Código</th>
                                <th class="px-6 py-3">Stock</th>
                                <th class="px-6 py-3">Estado</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-700">
                            <tr>
                                <td class="px-6 py-4">Juguetes niñas</td>
                                <td class="px-6 py-4">4242312561</td>
                                <td class="px-6 py-4 font-bold text-emerald-400">498</td>
                                <td class="px-6 py-4 text-emerald-400">Disponible</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        function switchTab(tabId) {
            // Ocultar todas
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Mostrar seleccionada
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
