<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Solidario 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-sky-400">Inventario Solidario 2026</h1>
            <nav class="flex flex-wrap gap-2 mt-4">
                <button onclick="mostrarTab('tab-config')" class="bg-slate-800 px-4 py-2 rounded">⚙️ Configuración</button>
                <button onclick="mostrarTab('tab-entrada')" class="bg-slate-800 px-4 py-2 rounded">📥 Entrada</button>
                <button onclick="mostrarTab('tab-despacho')" class="bg-slate-800 px-4 py-2 rounded">📤 Despacho</button>
                <button onclick="mostrarTab('tab-traslados')" class="bg-slate-800 px-4 py-2 rounded">🚚 Traslado</button>
                <button onclick="mostrarTab('tab-recepcion')" class="bg-sky-600 px-4 py-2 rounded">📦 Recepción</button>
                <button onclick="mostrarTab('tab-inventario')" class="bg-slate-800 px-4 py-2 rounded">📊 Inventario</button>
            </nav>
        </header>

        <div id="tab-config" class="tab-content"><div class="bg-slate-800 p-6 rounded-xl border border-slate-700"><h2 class="text-xl font-bold mb-4">Gestión de Usuarios</h2></div></div>
        <div id="tab-entrada" class="tab-content"><div class="bg-slate-800 p-6 rounded-xl border border-slate-700"><h2 class="text-xl font-bold mb-4">📥 Registro de Entrada</h2></div></div>
        <div id="tab-despacho" class="tab-content"><div class="bg-slate-800 p-6 rounded-xl border border-slate-700"><h2 class="text-xl font-bold mb-4">📤 Registro de Despacho</h2></div></div>
        <div id="tab-traslados" class="tab-content"><div class="bg-slate-800 p-6 rounded-xl border border-slate-700"><h2 class="text-xl font-bold mb-4">🚚 Gestión de Traslados</h2></div></div>
        
        <div id="tab-recepcion" class="tab-content active">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4">📦 Recepción de Traslados</h2>
                <input id="in-tracking-code" placeholder="Código de guía (Ej: GUIA-XXXXXX)" class="w-full p-3 rounded bg-slate-900 border border-slate-700 mb-4">
                <button id="btn-confirmar-recepcion" class="w-full bg-blue-600 p-3 rounded font-bold hover:bg-blue-700 transition">Confirmar Recepción</button>
                <div id="recepcion-resultado" class="mt-4 p-4 rounded hidden text-center font-semibold"></div>
            </div>
        </div>

        <div id="tab-inventario" class="tab-content"><div class="bg-slate-800 p-6 rounded-xl border border-slate-700"><h2 class="text-xl font-bold mb-4">📊 Reporte de Inventario</h2></div></div>
    </div>

    <script src="admin_logic.js"></script>
    <script>
        document.getElementById('btn-confirmar-recepcion').addEventListener('click', ejecutarRecepcion);
        function mostrarTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
