<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Solidario 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: #0ea5e9; font-weight: bold; cursor: pointer; border: none; }
        .hidden { display: none; }
        .suggestions { position: absolute; background: #1e293b; border: 1px solid #334155; z-index: 100; width: calc(100% - 40px); display: none; border-radius: 0 0 8px 8px; }
        .suggestion-item { padding: 10px; cursor: pointer; }
        .suggestion-item:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <section id="login-section" class="card">
            <h1>🔐 Iniciar Sesión</h1>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login">Entrar</button>
        </section>

        <section id="app-section" class="card hidden">
            <h1>📦 Registro de Movimiento</h1>
            <p id="user-info" style="color: #94a3b8; font-size: 0.8rem;"></p>
            
            <label>Nombre del Producto</label>
            <input id="in-name" placeholder="Escribe para buscar..." autocomplete="off">
            <div id="suggestions-items" class="suggestions"></div>

            <label>Código de barras</label>
            <input id="in-barcode" placeholder="Escanea o escribe">

            <label>Empresa / Ente</label>
            <input id="in-entity" placeholder="Buscar o crear ente..." autocomplete="off">
            <div id="suggestions-entities" class="suggestions"></div>

            <label>Tipo de Movimiento</label>
            <select id="in-type">
                <option value="ingreso">Ingreso</option>
                <option value="despacho">Despacho</option>
            </select>

            <label>Cantidad</label>
            <input id="in-qty" type="number" placeholder="0">

            <button id="btn-save">Registrar en Base de Datos</button>
        </section>
    </div>

    <script>
        // Inicialización segura de Supabase
        window.supabaseClient = window.supabaseClient || supabase.createClient('https://ajhubmxofzfdelxbgjjf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaHVibXhvZnpmZGVseGJnampmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzEwOTIsImV4cCI6MjA5OTAwNzA5Mn0.19vQ77T-kjNIu3-VZYrBT8hOnhiJvYtvwTfEiFK_8qU');
        const supabase = window.supabaseClient;
        let currentUser = null;

        // Función de cifrado SHA-256
        async function sha256(str) {
            const msgUint8 = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Lógica de Login
        document.getElementById('btn-login').onclick = async () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const hashedInput = await sha256(pass);

            const { data, error } = await supabase
                .from('users')
                .select('*, centers(name)')
                .eq('username', user)
                .single();

            if (error || data.password_hash !== hashedInput) {
                alert("Credenciales inválidas");
                return;
            }

            currentUser = data;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-info').textContent = `Usuario: ${currentUser.username} | Centro: ${currentUser.centers.name}`;
        };

        // Búsqueda dinámica
        async function buscar(query, tabla, campo, containerId) {
            const container = document.getElementById(containerId);
            if (query.length < 2) { container.style.display = 'none'; return; }
            const { data } = await supabase.from(tabla).select(campo).ilike(campo, `%${query}%`).limit(5);
            if (!data || data.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            container.innerHTML = data.map(item => `
                <div class="suggestion-item" onclick="seleccionar('${item[campo]}', '${containerId}')">
                    ${item[campo]}
                </div>`).join('');
        }

        function seleccionar(valor, containerId) {
            const inputId = containerId === 'suggestions-items' ? 'in-name' : 'in-entity';
            document.getElementById(inputId).value = valor;
            document.getElementById(containerId).style.display = 'none';
        }

        document.getElementById('in-name').addEventListener('input', (e) => buscar(e.target.value, 'items', 'name', 'suggestions-items'));
        document.getElementById('in-entity').addEventListener('input', (e) => buscar(e.target.value, 'entities', 'name', 'suggestions-entities'));

        // Registro de Movimiento
        document.getElementById('btn-save').onclick = async () => {
            const data = {
                p_item_name: document.getElementById('in-name').value,
                p_item_barcode: document.getElementById('in-barcode').value,
                p_entity_name: document.getElementById('in-entity').value,
                p_entity_type: document.getElementById('in-type').value === 'ingreso' ? 'donante' : 'receptor',
                p_quantity: parseInt(document.getElementById('in-qty').value),
                p_type: document.getElementById('in-type').value,
                p_center_id: currentUser.center_id,
                p_user_id: currentUser.id
            };

            const { error } = await supabase.rpc('register_movement', data);
            if (error) alert("Error: " + error.message);
            else {
                alert("Movimiento registrado correctamente");
                document.querySelectorAll('input').forEach(i => { if(i.id !== 'login-user' && i.id !== 'login-pass') i.value = ''; });
            }
        };
    </script>
</body>
</html>
