<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Solidario 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script> <!-- Librería de escáner -->
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: #0ea5e9; font-weight: bold; cursor: pointer; border: none; }
        .hidden { display: none; }
        #reader { width: 100%; background: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border: 1px solid #334155; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <!-- SECCIÓN LOGIN -->
        <section id="login-section" class="card">
            <h1>🔐 Iniciar Sesión</h1>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login">Entrar</button>
        </section>

        <!-- APLICACIÓN PRINCIPAL -->
        <section id="app-section" class="hidden">
            <div class="card">
                <button onclick="iniciarEscaner()">📷 Abrir Cámara (Escáner)</button>
                <div id="reader"></div>
            </div>

            <div class="card">
                <h1>📦 Registro</h1>
                <input id="in-name" placeholder="Producto...">
                <input id="in-barcode" placeholder="Código de barras...">
                <input id="in-entity" placeholder="Empresa...">
                <select id="in-type"><option value="ingreso">Ingreso</option><option value="despacho">Despacho</option></select>
                <input id="in-qty" type="number" placeholder="Cantidad">
                <button id="btn-save">Guardar Movimiento</button>
            </div>

            <div class="card">
                <h1>📊 Historial Reciente</h1>
                <table id="history-table">
                    <thead><tr><th>Producto</th><th>Tipo</th><th>Cant.</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const sbClient = supabase.createClient('https://ajhubmxofzfdelxbgjjf.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaHVibXhvZnpmZGVseGJnampmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzEwOTIsImV4cCI6MjA5OTAwNzA5Mn0.19vQ77T-kjNIu3-VZYrBT8hOnhiJvYtvwTfEiFK_8qU');
        let currentUser = null;

        // --- CÁMARA (Escáner) ---
        function iniciarEscaner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    document.getElementById('in-barcode').value = decodedText;
                    html5QrCode.stop();
                });
        }

        // --- CARGAR HISTORIAL ---
        async function cargarHistorial() {
            const { data } = await sbClient.from('movements').select('*, items(name)').order('movement_date', { ascending: false }).limit(5);
            document.getElementById('history-body').innerHTML = data.map(m => `
                <tr><td>${m.items.name}</td><td>${m.type}</td><td>${m.quantity}</td></tr>
            `).join('');
        }

        // --- LOGIN INTEGRADO ---
        document.getElementById('btn-login').onclick = async () => {
            // (Tu lógica de login que ya funciona)
            // Al finalizar el login exitoso, ejecutar:
            cargarHistorial();
        };

        // --- REGISTRO CON ACTUALIZACIÓN ---
        document.getElementById('btn-save').onclick = async () => {
            // (Tu lógica de registro que ya funciona)
            // Después del alert de éxito, llamar a:
            cargarHistorial();
        };
    </script>
</body>
</html>
