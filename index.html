<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Solidario - Gestión 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #334155; padding: 12px; text-align: left; }
        button { background: #0ea5e9; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 Inventario Centralizado</h1>
    </div>

    <div id="app" class="card">
        <h2>Historial de Movimientos</h2>
        <table id="mov-table">
            <thead>
                <tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Origen/Destino</th></tr>
            </thead>
            <tbody id="mov-body"></tbody>
        </table>
    </div>

<script>
    // Configuración
    const supabase = supabase.createClient('TU_URL', 'TU_KEY');

    async function cargarDatos() {
        const tbody = document.getElementById('mov-body');
        tbody.innerHTML = '<tr><td colspan="5">Cargando datos desde la BD...</td></tr>';

        // Consulta a la tabla migrada
        const { data, error } = await supabase
            .from('movements')
            .select(`
                id, type, quantity, entity_name, movement_date,
                items (name)
            `)
            .order('movement_date', { ascending: false });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="5" style="color:red">Error: ${error.message}</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(m => `
            <tr>
                <td>${new Date(m.movement_date).toLocaleDateString()}</td>
                <td>${m.items?.name || '---'}</td>
                <td>${m.type}</td>
                <td>${m.quantity}</td>
                <td>${m.entity_name}</td>
            </tr>
        `).join('');
    }

    // Inicializar al cargar la página
    cargarDatos();
</script>
</body>
</html>
