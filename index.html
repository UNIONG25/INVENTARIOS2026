<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================
// CONFIGURACIÓN - CAMBIA ESTO
// ============================================
const SUPABASE_URL = 'https://TU-PROYECTO.supabase.co';
const SUPABASE_ANON = 'TU-ANON-KEY';
const AUDIT_HMAC_SEED = 'cambia-esta-semilla-por-una-aleatoria-larga';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let session = null;

// ============================================
// CRYPTO
// ============================================
const enc = new TextEncoder();
const dec = new TextDecoder();
const b64 = {
  enc: buf => btoa(String.fromCharCode(...new Uint8Array(buf))),
  dec: str => Uint8Array.from(atob(str), c => c.charCodeAt(0))
};

async function deriveKey(password, salt) {
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:enc.encode(salt), iterations:200000, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
}

async function aesEncrypt(key, plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(plaintext));
  return {iv: b64.enc(iv), ct: b64.enc(ct)};
}

async function aesDecrypt(key, ivB64, ctB64) {
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64.dec(ivB64)}, key, b64.dec(ctB64));
  return dec.decode(pt);
}

async function sha256(str) {
  const h = await crypto.subtle.digest('SHA-256', enc.encode(str));
  return b64.enc(h);
}

async function hmacSign(key, data) {
  const k = await crypto.subtle.importKey('raw', enc.encode(key), {name:'HMAC', hash:'SHA-256'}, false, ['sign']);
  const s = await crypto.subtle.sign('HMAC', k, enc.encode(data));
  return b64.enc(s);
}

async function hashPassword(password, salt) {
  const base = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    {name:'PBKDF2', salt:enc.encode(salt), iterations:200000, hash:'SHA-256'},
    base, 256
  );
  return b64.enc(bits);
}

// ============================================
// AUDITORÍA
// ============================================
let lastAuditHash = null;

async function loadLastAuditHash() {
  const {data} = await sb.from('audit_log')
    .select('payload_hash')
    .eq('center_id', session.centerId)
    .order('id', {ascending:false})
    .limit(1)
    .maybeSingle();
  lastAuditHash = data?.payload_hash || '0';
}

async function audit(action, targetType, targetId, payload) {
  const payloadStr = JSON.stringify({action, targetType, targetId, payload, ts:Date.now(), user:session.username});
  const ph = await sha256(payloadStr);
  const chainInput = (lastAuditHash||'0') + '|' + ph;
  const sig = await hmacSign(AUDIT_HMAC_SEED + ':' + session.centerId, chainInput);
  const row = {
    center_id: session.centerId,
    user_id: session.user.id,
    action,
    target_type: targetType,
    target_id: targetId,
    payload_hash: ph,
    prev_hash: lastAuditHash||'0',
    signature: sig
  };
  const {error} = await sb.from('audit_log').insert(row);
  if (error) throw error;
  lastAuditHash = ph;
}

// ============================================
// AUTH
// ============================================
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const msg = document.getElementById('login-msg');
  msg.innerHTML = '';
  
  if (!u || !p) {
    msg.innerHTML = '<div class="alert err">Completa los campos</div>';
    return;
  }

  const {data:user, error} = await sb.from('users')
    .select('*')
    .eq('username', u)
    .eq('active', true)
    .maybeSingle();
    
  if (error || !user) {
    msg.innerHTML = '<div class="alert err">Credenciales inválidas</div>';
    return;
  }

  const ph = await hashPassword(p, user.salt);
  if (ph !== user.password_hash) {
    msg.innerHTML = '<div class="alert err">Credenciales inválidas</div>';
    return;
  }

  const keyMaterial = user.role === 'admin' ? `admin:${user.salt}` : user.salt;
  const centerKey = await deriveKey(p, keyMaterial);

  session = {user, centerKey, centerId:user.center_id, role:user.role, username:u, password:p};
  await loadLastAuditHash();
  await audit('LOGIN', 'user', user.id, {ip:navigator.userAgent.slice(0,60)});

  document.getElementById('view-login').classList.add('hidden');
  document.getElementById('view-app').classList.remove('hidden');
  document.getElementById('whoami').textContent = `${u} · ${user.role} · ${user.role==='admin'?'GLOBAL':user.center_id?.slice(0,8)}`;
  renderTabs();
}

function doLogout() {
  session = null;
  lastAuditHash = null;
  document.getElementById('view-app').classList.add('hidden');
  document.getElementById('view-login').classList.remove('hidden');
}

// ============================================
// TABS
// ============================================
const TABS = {
  admin: [
    {id:'centers', label:'Centros'},
    {id:'users', label:'Usuarios'},
    {id:'dashboard', label:'Dashboard'},
    {id:'audit', label:'Auditoría'}
  ],
  operator: [
    {id:'register-family', label:'Grupo Familiar'},
    {id:'register-individual', label:'Persona Sola'},
    {id:'records', label:'Registros'},
    {id:'audit', label:'Auditoría'}
  ]
};

function renderTabs() {
  const tabs = TABS[session.role];
  const tabsContainer = document.getElementById('tabs');
  tabsContainer.innerHTML = '';
  
  tabs.forEach((t, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i===0?' active':'');
    tab.dataset.tab = t.id;
    tab.textContent = t.label;
    tab.onclick = () => switchTab(t.id);
    tabsContainer.appendChild(tab);
  });
  
  switchTab(tabs[0].id);
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === id);
  });
  
  const c = document.getElementById('tab-content');
  
  if (id === 'centers') renderCenters(c);
  else if (id === 'users') renderUsers(c);
  else if (id === 'dashboard') renderDashboard(c);
  else if (id === 'register-family') renderRegisterFamily(c);
  else if (id === 'register-individual') renderRegisterIndividual(c);
  else if (id === 'records') renderRecords(c);
  else if (id === 'audit') renderAudit(c);
}

// ============================================
// CENTROS (ADMIN)
// ============================================
async function renderCenters(c) {
  const {data} = await sb.from('centers').select('*').order('name');
  
  c.innerHTML = `
    <div class="card">
      <h2>Nuevo centro de acopio</h2>
      <input id="nc-name" placeholder="Nombre del centro">
      <button id="btn-create-center">Crear centro</button>
    </div>
    <div class="card">
      <h2>Centros (${data?.length||0})</h2>
      <table>
        <thead><tr><th>Nombre</th><th>ID</th><th>Creado</th></tr></thead>
        <tbody>
          ${(data||[]).map(r => `
            <tr>
              <td>${r.name}</td>
              <td class="mono">${r.id.slice(0,8)}…</td>
              <td>${new Date(r.created_at).toLocaleString()}</td>
            </tr>
          `).join('') || '<tr><td colspan="3" style="color:#64748b">Sin centros</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
  
  document.getElementById('btn-create-center').onclick = createCenter;
}

async function createCenter() {
  const name = document.getElementById('nc-name').value.trim();
  if (!name) return alert('Nombre requerido');
  
  const {error} = await sb.from('centers').insert({name});
  if (error) return alert(error.message);
  
  await audit('CREATE_CENTER', 'center', null, {name});
  renderCenters(document.getElementById('tab-content'));
}

// ============================================
// USUARIOS (ADMIN)
// ============================================
async function renderUsers(c) {
  const {data:centers} = await sb.from('centers').select('id,name');
  const {data:users} = await sb.from('users').select('*,centers(name)').order('created_at', {ascending:false});
  
  let centersOptions = '<option value="">— sin centro (admin) —</option>';
  if (centers) {
    centers.forEach(x => {
      centersOptions += `<option value="${x.id}">${x.name}</option>`;
    });
  }
  
  let usersRows = '';
  if (users && users.length > 0) {
    users.forEach(u => {
      usersRows += `
        <tr>
          <td>${u.username}</td>
          <td>${u.role}</td>
          <td>${u.centers?.name||'—'}</td>
          <td>${u.active?'✅':'❌'}</td>
          <td>
            <button class="ghost btn-toggle-user" data-id="${u.id}" data-active="${!u.active}" style="width:auto;padding:4px 8px">
              ${u.active?'Desactivar':'Activar'}
            </button>
          </td>
        </tr>
      `;
    });
  } else {
    usersRows = '<tr><td colspan="5" style="color:#64748b">Sin usuarios</td></tr>';
  }
  
  c.innerHTML = `
    <div class="card">
      <h2>Crear usuario</h2>
      <div class="row">
        <div><label>Usuario</label><input id="nu-user"></div>
        <div><label>Contraseña</label><input id="nu-pass" type="text"></div>
      </div>
      <label>Rol</label>
      <select id="nu-role">
        <option value="operator">Operador de centro</option>
        <option value="admin">Administrador global</option>
      </select>
      <label>Centro (solo operadores)</label>
      <select id="nu-center">
        ${centersOptions}
      </select>
      <button id="btn-create-user">Crear usuario</button>
      <div id="nu-msg"></div>
    </div>
    <div class="card">
      <h2>Usuarios</h2>
      <table>
        <thead><tr><th>Usuario</th><th>Rol</th><th>Centro</th><th>Activo</th><th></th></tr></thead>
        <tbody>${usersRows}</tbody>
      </table>
    </div>
  `;
  
  document.getElementById('btn-create-user').onclick = createUser;
  document.querySelectorAll('.btn-toggle-user').forEach(btn => {
    btn.onclick = () => toggleUser(btn.dataset.id, btn.dataset.active === 'true');
  });
}

async function createUser() {
  const username = document.getElementById('nu-user').value.trim();
  const password = document.getElementById('nu-pass').value;
  const role = document.getElementById('nu-role').value;
  const center_id = document.getElementById('nu-center').value || null;
  const msg = document.getElementById('nu-msg');
  
  if (!username || !password) {
    msg.innerHTML = '<div class="alert err">Completa usuario y contraseña</div>';
    return;
  }
  if (role === 'operator' && !center_id) {
    msg.innerHTML = '<div class="alert err">Un operador necesita centro</div>';
    return;
  }

  const salt = b64.enc(crypto.getRandomValues(new Uint8Array(16)));
  const password_hash = await hashPassword(password, salt);
  
  const {error} = await sb.from('users').insert({username, password_hash, salt, role, center_id});
  if (error) {
    msg.innerHTML = `<div class="alert err">${error.message}</div>`;
    return;
  }
  
  msg.innerHTML = '<div class="alert ok">Usuario creado</div>';
  await audit('CREATE_USER', 'user', null, {username, role, center_id});
  setTimeout(() => renderUsers(document.getElementById('tab-content')), 800);
}

async function toggleUser(id, active) {
  await sb.from('users').update({active}).eq('id', id);
  await audit(active ? 'ACTIVATE_USER' : 'DEACTIVATE_USER', 'user', id, {active});
  renderUsers(document.getElementById('tab-content'));
}

// ============================================
// DASHBOARD (ADMIN)
// ============================================
async function renderDashboard(c) {
  c.innerHTML = '<div class="card"><h2>Cargando estadísticas…</h2></div>';
  
  const {data:families} = await sb.from('families').select('center_id');
  const {data:individuals} = await sb.from('individuals').select('center_id');
  const {data:centers} = await sb.from('centers').select('id,name');
  
  const stats = {};
  centers?.forEach(c => { stats[c.id] = {name:c.name, families:0, individuals:0}; });
  
  families?.forEach(f => { if (stats[f.center_id]) stats[f.center_id].families++; });
  individuals?.forEach(i => { if (stats[i.center_id]) stats[i.center_id].individuals++; });
  
  let rows = '';
  Object.values(stats).forEach(s => {
    rows += `<tr><td>${s.name}</td><td>${s.families}</td><td>${s.individuals}</td><td>${s.families + s.individuals}</td></tr>`;
  });
  
  c.innerHTML = `
    <div class="card">
      <h2>Dashboard General</h2>
      <table>
        <thead><tr><th>Centro</th><th>Familias</th><th>Personas Solas</th><th>Total</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="4" style="color:#64748b">Sin datos</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

// REGISTRO GRUPO FAMILIAR
// ============================================

    <div class="card">

      <h3>Representantes</h3>

      <input id="f-representatives" placeholder="Ej: Pérez García, Juan Carlos">
      
      <div class="row">

          <label>Grupo Sanguíneo (representantes)</label>
          <select id="f-blood-rep">

      <input id="f-residence" placeholder="Dirección o zona">

          </select>

          <label>Afectación del Inmueble</label>

        </div>
      </div>
      
      <label>Pérdidas humanas / pariente</label>
      <input id="f-human-losses" placeholder="Descripción si aplica">
      
      <label>Ocupación de los Representantes</label>

      <button id="btn-save-family" style="margin-top:16px">Guardar Registro Familiar</button>
    </div>

  document.getElementById('btn-add-child').onclick = addChild;

let childCount = 0;
function addChild() {
  childCount++;
  const container = document.getElementById('children-container');
  const div = document.createElement('div');
  div.className = 'child-entry';
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <strong>Niño/a #${childCount}</strong>
      <button class="danger btn-remove-child" style="width:auto;padding:4px 8px">Eliminar</button>
    </div>
    <label>Apellidos y nombres</label>
    <input class="child-name" placeholder="Nombre completo">
    <div class="row">
      <div>
        <label>Grupo Sanguíneo</label>
        <select class="child-blood">
          <option value="">—</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option>
          <option>O+</option><option>O-</option>
        </select>
      </div>
      <div>
        <label>Enfermedades</label>
        <input class="child-diseases" placeholder="Enfermedades">
      </div>
    </div>
    <label>Alérgico a</label>
    <input class="child-allergies" placeholder="Alergias">
    <label>Escolarizado</label>
    <select class="child-schooled">
      <option value="si">Sí</option>
      <option value="no">No</option>
    </select>
  `;
  container.appendChild(div);
  
  div.querySelector('.btn-remove-child').onclick = () => div.remove();
}

async function saveFamily() {
  const representatives = document.getElementById('f-representatives').value.trim();
  if (!representatives) return alert('Nombre de representantes requerido');
  
  const children = [];
  document.querySelectorAll('.child-entry').forEach(entry => {
    children.push({
      name: entry.querySelector('.child-name').value.trim(),
      blood: entry.querySelector('.child-blood').value,
      diseases: entry.querySelector('.child-diseases').value.trim(),
      allergies: entry.querySelector('.child-allergies').value.trim(),
      schooled: entry.querySelector('.child-schooled').value
    });
  });
  
  const payload = {
    type: 'family',
    representatives,
    bloodRepresentatives: document.getElementById('f-blood-rep').value,
    diseasesRepresentatives: document.getElementById('f-diseases-rep').value.trim(),
    allergiesRepresentatives: document.getElementById('f-allergies-rep').value.trim(),
    children,
    criminalRecord: document.getElementById('f-criminal-record').value,
    origin: document.getElementById('f-origin').value.trim(),
    residence: document.getElementById('f-residence').value.trim(),
    housingType: document.getElementById('f-housing-type').value,
    housingDamage: document.getElementById('f-housing-damage').value.trim(),
    humanLosses: document.getElementById('f-human-losses').value.trim(),
    occupation: document.getElementById('f-occupation').value.trim()
  };
  
  const {iv, ct} = await aesEncrypt(session.centerKey, JSON.stringify(payload));
  
  const {error} = await sb.from('families').insert({
    center_id: session.centerId,
    encrypted_payload: ct,
    iv,
    created_by: session.user.id
  });
  
  if (error) return alert(error.message);
  
  alert('✅ Familia registrada exitosamente');
  await audit('REGISTER_FAMILY', 'family', null, {representatives, childrenCount: children.length});
  
  // Limpiar formulario
  document.querySelectorAll('#view-app input, #view-app select, #view-app textarea').forEach(el => {
    if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  document.getElementById('children-container').innerHTML = '';
  childCount = 0;
}

// ============================================
// REGISTRO PERSONA SOLA

async function saveIndividual() {
  const name = document.getElementById('i-name').value.trim();
  if (!name) return alert('Nombre requerido');
  
  const payload = {
    type: 'individual',
    name,
    sex: document.getElementById('i-sex').value,
    blood: document.getElementById('i-blood').value,
    diseases: document.getElementById('i-diseases').value.trim(),
    allergies: document.getElementById('i-allergies').value.trim(),
    criminalRecord: document.getElementById('i-criminal-record').value,
    origin: document.getElementById('i-origin').value.trim(),
    residence: document.getElementById('i-residence').value.trim(),
    housingType: document.getElementById('i-housing-type').value,
    housingDamage: document.getElementById('i-housing-damage').value.trim(),
    humanLosses: document.getElementById('i-human-losses').value.trim(),
    occupation: document.getElementById('i-occupation').value.trim()
  };
  
  const {iv, ct} = await aesEncrypt(session.centerKey, JSON.stringify(payload));
  
  const {error} = await sb.from('individuals').insert({
    center_id: session.centerId,
    encrypted_payload: ct,
    iv,
    created_by: session.user.id
  });
  
  if (error) return alert(error.message);
  
  alert('✅ Persona registrada exitosamente');
  await audit('REGISTER_INDIVIDUAL', 'individual', null, {name});
  
  // Limpiar formulario
  document.querySelectorAll('#view-app input, #view-app select, #view-app textarea').forEach(el => {
    if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
}

async function renderRecords(c) {
  c.innerHTML = '<div class="card"><h2>Cargando registros…</h2></div>';
  
  const {data:families} = await sb.from('families')
    .select('*')
    .eq('center_id', session.centerId)
    .order('created_at', {ascending:false});
  
  const {data:individuals} = await sb.from('individuals')
    .select('*')
    .eq('center_id', session.centerId)
    .order('created_at', {ascending:false});
  
  const decryptedFamilies = [];
  for (const f of families||[]) {
    try {
      const payload = JSON.parse(await aesDecrypt(session.centerKey, f.iv, f.encrypted_payload));
      decryptedFamilies.push({...f, ...payload});
    } catch(e) {}
  }
  
  const decryptedIndividuals = [];
  for (const i of individuals||[]) {
    try {
      const payload = JSON.parse(await aesDecrypt(session.centerKey, i.iv, i.encrypted_payload));
      decryptedIndividuals.push({...i, ...payload});
    } catch(e) {}
  }
  
  let rows = '';
  decryptedFamilies.forEach(f => {
    rows += `
      <tr>
        <td><span class="badge b-family">Familia</span></td>
        <td>${f.representatives}</td>
        <td>${f.children?.length||0} niños</td>
        <td>${new Date(f.created_at).toLocaleDateString()}</td>
        <td>
          <button class="ghost btn-view-family" data-id="${f.id}" style="width:auto;padding:4px 8px">Ver</button>
        </td>
      </tr>
    `;
  });
  
  decryptedIndividuals.forEach(i => {
    rows += `
      <tr>
        <td><span class="badge b-individual">Individual</span></td>
        <td>${i.name}</td>
        <td>${i.sex}</td>
        <td>${new Date(i.created_at).toLocaleDateString()}</td>
        <td>
          <button class="ghost btn-view-individual" data-id="${i.id}" style="width:auto;padding:4px 8px">Ver</button>
        </td>
      </tr>
    `;
  });
  
  c.innerHTML = `
    <div class="card">
      <h2>Registros (${decryptedFamilies.length + decryptedIndividuals.length})</h2>
      <table>
        <thead><tr><th>Tipo</th><th>Nombre</th><th>Detalle</th><th>Fecha</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" style="color:#64748b">Sin registros</td></tr>'}</tbody>
      </table>
    </div>
  `;
  
  window._familiesCache = decryptedFamilies;
  window._individualsCache = decryptedIndividuals;
  
  document.querySelectorAll('.btn-view-family').forEach(btn => {
    btn.onclick = () => viewFamily(btn.dataset.id);
  });
  document.querySelectorAll('.btn-view-individual').forEach(btn => {
    btn.onclick = () => viewIndividual(btn.dataset.id);
  });
}

function viewFamily(id) {
  const f = window._familiesCache.find(x => x.id === id);
  if (!f) return;
  
  let childrenHtml = '';
  f.children?.forEach((c, i) => {
    childrenHtml += `
      <div class="child-entry">
        <strong>${i+1}. ${c.name}</strong><br>
        Sangre: ${c.blood||'—'} | Escolarizado: ${c.schooled}<br>
        Enfermedades: ${c.diseases||'—'}<br>
        Alergias: ${c.allergies||'—'}
      </div>
    `;
  });
  
  alert(`
FAMILIA: ${f.representatives}
Sangre: ${f.bloodRepresentatives||'—'}
Enfermedades: ${f.diseasesRepresentatives||'—'}
Alergias: ${f.allergiesRepresentatives||'—'}

NIÑOS (${f.children?.length||0}):
${childrenHtml}

ORIGEN: ${f.origin||'—'}
RESIDENCIA: ${f.residence||'—'}
VIVIENDA: ${f.housingType} - ${f.housingDamage||'sin daños'}
PÉRDIDAS: ${f.humanLosses||'—'}
OCUPACIÓN: ${f.occupation||'—'}
ANTECEDENTES: ${f.criminalRecord}
  `);
}

function viewIndividual(id) {
  const i = window._individualsCache.find(x => x.id === id);
  if (!i) return;
  
  alert(`
PERSONA: ${i.name}
SEXO: ${i.sex}
SANGRE: ${i.blood||'—'}
ENFERMEDADES: ${i.diseases||'—'}
ALERGIAS: ${i.allergies||'—'}

  `);
}

// ============================================
// AUDITORÍA
// ============================================
async function renderAudit(c) {
  let query = sb.from('audit_log').select('*');
  if (session.role !== 'admin') {
    query = query.eq('center_id', session.centerId);
  }
  
  const {data} = await query.order('id', {ascending:false}).limit(500);

  let chainOk = true;
  let brokenAt = null;
  const sorted = [...(data||[])].sort((a,b) => a.id - b.id);
  let prev = '0';
  
  for (const row of sorted) {
    if (row.prev_hash !== prev) {
      chainOk = false;
      brokenAt = row.id;
      break;
    }
    const chainInput = row.prev_hash + '|' + row.payload_hash;
    const expected = await hmacSign(AUDIT_HMAC_SEED + ':' + row.center_id, chainInput);
    if (expected !== row.signature) {
      chainOk = false;
      brokenAt = row.id;
      break;
    }
    prev = row.payload_hash;
  }

  const alertClass = chainOk ? 'ok' : 'err';
  const alertMsg = chainOk 
    ? '✅ Cadena íntegra — no se detectó manipulación'
    : `⚠️ Cadena ROTA en registro #${brokenAt}. Posible manipulación.`;

  let auditRows = '';
  if (data && data.length > 0) {
    data.forEach(r => {
      auditRows += `
        <tr>
          <td>${r.id}</td>
          <td>${new Date(r.created_at).toLocaleString()}</td>
          <td>${r.user_id?.slice(0,8)||'?'}</td>
          <td><b>${r.action}</b></td>
          <td class="mono">${r.target_type||''} ${r.target_id?.slice(0,8)||''}</td>
        </tr>
      `;
    });
  } else {
    auditRows = '<tr><td colspan="5" style="color:#64748b">Vacío</td></tr>';
  }

  c.innerHTML = `
    <div class="card">
      <h2>Integridad de auditoría</h2>
      <div class="alert ${alertClass}">${alertMsg}</div>
      <button id="btn-export-audit" class="ghost">📥 Exportar CSV</button>
    </div>
    <div class="card">
      <h2>Registros (${(data||[]).length})</h2>
      <table>
        <thead><tr><th>#</th><th>Fecha</th><th>Usuario</th><th>Acción</th><th>Target</th></tr></thead>
        <tbody>${auditRows}</tbody>
      </table>
    </div>
  `;
  
  window._auditData = data;
  document.getElementById('btn-export-audit').onclick = exportAudit;
}

function exportAudit() {
  const rows = [['id','created_at','user_id','action','target_type','target_id','payload_hash','prev_hash','signature']];
  (window._auditData||[]).forEach(r => {
    rows.push([r.id, r.created_at, r.user_id, r.action, r.target_type, r.target_id, r.payload_hash, r.prev_hash, r.signature]);
  });
  
  const csv = rows.map(r => r.map(c => `"${(c||'').toString().replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `audit_${Date.now()}.csv`;
  a.click();
}
